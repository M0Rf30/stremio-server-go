        type: string
      - description: caller-supplied session key
        in: path
        name: key
        type: string
      - description: lz-string encoded JSON payload (url/fileIdx/fileMustInclude)
        in: query
        name: lz
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: session key
          schema:
            additionalProperties:
              type: string
            type: object
        "307":
          description: redirect to the stream URL (GET)
        "400":
          description: Bad Request
        "404":
          description: Not Found
      summary: Create an archive streaming session (zip/rar/7zip/tar/tgz)
      tags:
      - Archive
    post:
      consumes:
      - application/json
      parameters:
      - description: 'archive format: zip, rar, 7zip, tar, or tgz'
        in: path
        name: archiveType
        required: true
        type: string
      - description: caller-supplied session key
        in: path
        name: key
        type: string
      - description: lz-string encoded JSON payload (url/fileIdx/fileMustInclude)
        in: query
        name: lz
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: session key
          schema:
            additionalProperties:
              type: string
            type: object
        "307":
          description: redirect to the stream URL (GET)
        "400":
          description: Bad Request
        "404":
          description: Not Found
      summary: Create an archive streaming session (zip/rar/7zip/tar/tgz)
      tags:
      - Archive
  /{archiveType}/stream/{key}/{file}:
    get:
      parameters:
      - description: 'archive format: zip, rar, 7zip, tar, or tgz'
        in: path
        name: archiveType
        required: true
        type: string
      - description: session key
        in: path
        name: key
        required: true
        type: string
      - description: file path within the archive
        in: path
        name: file
        type: string
      - description: byte range (RFC 7233)
        in: header
        name: Range
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
        "206":
          description: partial content
          schema:
            type: string
        "307":
          description: redirect to the canonical file URL
        "404":
          description: Not Found
      summary: Stream a file from an archive session
      tags:
      - Archive
  /{infoHash}/{fileIdx}:
    get:
      parameters:
      - description: 40-hex info hash
        in: path
        name: infoHash
        required: true
        type: string
      - description: file index
        in: path
        name: fileIdx
        required: true
        type: integer
      - description: byte range
        in: header
        name: Range
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
        "206":
          description: partial content
          schema:
            type: string
        "416":
          description: Requested Range Not Satisfiable
      summary: Stream a torrent file by info hash and file index
      tags:
      - Streaming
