basePath: /
definitions:
  types.FileInfo:
    properties:
      length:
        type: integer
      name:
        type: string
      offset:
        type: integer
      path:
        type: string
    type: object
  types.Growler:
    properties:
      flood:
        type: integer
      pulse:
        type: integer
    type: object
  types.Options:
    properties:
      connections:
        type: integer
      dht:
        type: boolean
      growler:
        $ref: '#/definitions/types.Growler'
      handshakeTimeout:
        type: integer
      path:
        type: string
      peerSearch:
        $ref: '#/definitions/types.PeerSearch'
      swarmCap:
        $ref: '#/definitions/types.SwarmCap'
      timeout:
        type: integer
      tracker:
        type: boolean
      virtual:
        type: boolean
    type: object
  types.PeerSearch:
    properties:
      max:
        type: integer
      min:
        type: integer
      sources:
        items:
          type: string
        type: array
    type: object
  types.Source:
    properties:
      lastStarted:
        type: string
      numFound:
        type: integer
      numFoundUniq:
        type: integer
      numRequests:
        type: integer
      url:
        type: string
    type: object
  types.Stats:
    properties:
      connectionTries:
        type: integer
      downloadSpeed:
        type: number
      downloaded:
        type: integer
      files:
        items:
          $ref: '#/definitions/types.FileInfo'
        type: array
      guessedFileIdx:
        description: |-
          GuessedFileIdx is set only in the /create response when the client asked
          the server to guess (guessFileIdx) or a fileMustInclude matched.
        type: integer
      infoHash:
        type: string
      name:
        type: string
      opts:
        $ref: '#/definitions/types.Options'
      peerSearchRunning:
        description: PeerSearchRunning is REQUIRED (non-null) by stremio-core's Statistics.
        type: boolean
      peers:
        type: integer
      queued:
        type: integer
      selections:
        description: |-
          Selections holds piece-selection ranges (null or an array). The element
          shape is anacrolix-internal and never populated by the engine today, so
          []any preserves the null/empty-array wire semantics without constraining
          the unknown element type.
        items: {}
        type: array
      sources:
        items:
          $ref: '#/definitions/types.Source'
        type: array
      streamLen:
        description: Per-file extras (only when a file index is requested).
        type: integer
      streamName:
        type: string
      streamProgress:
        type: number
      swarmConnections:
        type: integer
      swarmPaused:
        type: boolean
      swarmSize:
        type: integer
      unchoked:
        type: integer
      unique:
        type: integer
      uploadSpeed:
        type: number
      uploaded:
        type: integer
      wires:
        items:
          $ref: '#/definitions/types.Wire'
        type: array
    type: object
  types.SwarmCap:
    properties:
      maxSpeed:
        type: number
      minPeers:
        type: integer
    type: object
  types.Wire:
    properties:
      address:
        type: string
      amInterested:
        type: boolean
      downSpeed:
        type: number
      isSeeder:
        type: boolean
      requests:
        type: integer
      upSpeed:
        type: number
    type: object
host: 127.0.0.1:11470
info:
  contact: {}
  description: HTTP API served by stremio-server-go, a pure-Go drop-in for Stremio's
    streaming server (server.js). serverVersion is reported as 4.21.0 for client feature-gating;
    it is independent of the binary build version.
  license:
    name: MIT
    url: https://github.com/M0Rf30/stremio-server-go/blob/main/LICENSE
  title: stremio-server-go enginefs API
  version: 4.21.0
paths:
  /:
    get:
      responses:
        "307":
          description: Temporary Redirect
      summary: Redirect to the Stremio web UI
      tags:
      - System
  /{archiveType}/create:
    get:
      consumes:
      - application/json
      parameters:
      - description: 'archive format: zip, rar, 7zip, tar, or tgz'
        in: path
        name: archiveType
        required: true
        type: string
      - description: lz-string encoded JSON payload (url/fileIdx/fileMustInclude)
        in: query
        name: lz
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: session key
          schema:
            additionalProperties:
              type: string
            type: object
        "307":
          description: redirect to the stream URL (GET)
        "400":
          description: Bad Request
        "404":
          description: Not Found
      summary: Create an archive streaming session (zip/rar/7zip/tar/tgz)
      tags:
      - Archive
    post:
      consumes:
      - application/json
      parameters:
      - description: 'archive format: zip, rar, 7zip, tar, or tgz'
        in: path
        name: archiveType
        required: true
        type: string
      - description: lz-string encoded JSON payload (url/fileIdx/fileMustInclude)
        in: query
        name: lz
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: session key
          schema:
            additionalProperties:
              type: string
            type: object
        "307":
          description: redirect to the stream URL (GET)
        "400":
          description: Bad Request
        "404":
          description: Not Found
      summary: Create an archive streaming session (zip/rar/7zip/tar/tgz)
      tags:
      - Archive
