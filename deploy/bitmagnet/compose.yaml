# Local Bitmagnet (DHT crawler + GraphQL index) for the stremio-server-go /bitmagnet add-on.
#
#   podman compose -f deploy/bitmagnet/compose.yaml up -d
#
# WebUI + GraphQL: http://localhost:3333   (GraphiQL at /graphql)
# Point the server at it:  STREMIO_BITMAGNET_URL=http://localhost:3333/graphql
#
# Notes:
# - First start runs DB migrations; the DHT crawler begins populating immediately,
#   but coverage of a *specific* title is probabilistic and grows over time.
# - Set TMDB_API_KEY to enable content classification / IMDB (tt) matching, which
#   the add-on relies on to filter by movie/series. Without it, crawled torrents
#   stay unclassified and the add-on returns no streams.
services:
  bitmagnet:
    image: ghcr.io/bitmagnet-io/bitmagnet:latest
    container_name: bitmagnet
    restart: unless-stopped
    ports:
      - "3333:3333"      # GraphQL API + WebUI
      - "3334:3334/tcp"  # BitTorrent peer / DHT
      - "3334:3334/udp"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PASSWORD=postgres
      - TMDB_API_KEY=${TMDB_API_KEY:-}   # set in deploy/bitmagnet/.env (git-ignored) or export it
    volumes:
      - bitmagnet-config:/root/.config/bitmagnet
    command: ["worker", "run", "--all"]
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: bitmagnet-postgres
    restart: unless-stopped
    shm_size: 1g
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=bitmagnet
      - PGUSER=postgres
    volumes:
      - bitmagnet-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 10s
      start_period: 20s

volumes:
  bitmagnet-config:
  bitmagnet-pgdata:
